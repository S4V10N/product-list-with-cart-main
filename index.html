<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="dist/styles.css" />
        <script src="app.js" defer></script>
        <title>Frontend Mentor | Product list with cart</title>
    </head>
    <body>
        <header>
            <h1><strong>Desserts</strong></h1>
        </header>

        <main>
            <article>
                <section class="products" id="products"></section>
                <section id="checkout" class="checkout">
                    <h2>
                        <strong
                            >your cart (<span class="order-q">0</span>)</strong
                        >
                    </h2>
                    <div class="if-empty">
                        <img
                            src="assets/images/illustration-empty-cart.svg"
                            alt="empty-cart"
                        />

                        <p>Your added items will appear here</p>
                    </div>
                    <div class="if-not-empty hidden">
                        <div class="order-box"></div>

                        <div id="total" class="total">
                            <p>Order Total</p>
                            <strong
                                ><span
                                    id="order-total"
                                    class="order-total"
                                ></span
                            ></strong>
                        </div>

                        <p class="checkout-msg">
                            <img
                                src="assets/images/icon-carbon-neutral.svg"
                                alt="carbon-neutral-icon"
                            />
                            This is a <strong>carbon-neutral</strong> delivery
                        </p>
                        <button id="confirm-order">confirm order</button>
                    </div>
                </section>
            </article>
            <section id="order-confirmed" class="order-confirmed hidden">
                <img
                    src="assets/images/icon-order-confirmed.svg"
                    alt="order-confirmed"
                />
                <h2>order confirmed</h2>
                <p class="order-msg">We hope you enjoy your food!</p>

                <div class="order-highlight">
                    <div class="order cell"></div>

                    <div id="total" class="total">
                        <p>Order Total</p>
                        <strong
                            ><span id="order-total" class="order-total"></span
                        ></strong>
                    </div>
                </div>
                <button id="new-order">start new order</button>
            </section>
        </main>
        <footer>
            <div class="attribution">
                Challenge by
                <a
                    href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank"
                    >Frontend Mentor</a
                >
                Coded by
                <a
                    href="
https://savion-dev.vercel.app"
                    >Savion</a
                >
            </div>
        </footer>
    </body>
</html>
